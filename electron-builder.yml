appId: com.fbpagestudio.app
productName: FB Page Studio
copyright: Copyright © FB Page Studio
directories:
  output: dist-desktop-oauth
  buildResources: build
files:
  - electron/**/*
  - src/**/*
  - public/**/*
  - assets/**/*
  - build/icon.ico
  - package.json
  - "!data/**/*"
  - "!dist/**/*"
  - "!dist-desktop/**/*"
  - "!build-staging/**/*"
  - "!.git/**/*"
asar: true
asarUnpack:
  - "**/*.node"
  - "**/better-sqlite3/**/*"
win:
  icon: build/icon.ico
  # Taskbar pin / Start Menu identity
  executableName: FB Page Studio
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
portable:
  artifactName: FB-Page-Studio-Desktop.exe
nsis:
  # Bản cài đặt: icon + shortcut Start Menu + Desktop → ghim taskbar
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  runAfterFinish: true
  shortcutName: FB Page Studio
  uninstallDisplayName: FB Page Studio
  artifactName: FB-Page-Studio-Setup-v${version}.exe
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  deleteAppDataOnUninstall: false
  include: build/installer.nsh
extraMetadata:
  main: electron/main.cjs




